<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pensum MED">
<meta name="theme-color" content="#f2f2f7">
<title>Pensum Medicina · UTESA</title>
<style>
:root{
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;--purple:#AF52DE;
  --gray:#8E8E93;--gray2:#AEAEB2;--gray6:#F2F2F7;--gray5:#E5E5EA;
  --bg:#FFFFFF;--surface:#F2F2F7;--sep:rgba(60,60,67,0.12);
  --text:#000;--text2:rgba(60,60,67,0.85);--text3:rgba(60,60,67,0.55);
  --r:12px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --blue:#0A84FF;--green:#30D158;--red:#FF453A;--orange:#FF9F0A;--purple:#BF5AF2;
  --gray6:#2C2C2E;--gray5:#3A3A3C;--bg:#1C1C1E;--surface:#000;
  --sep:rgba(84,84,88,0.55);--text:#FFF;--text2:rgba(235,235,245,0.85);--text3:rgba(235,235,245,0.5);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--surface)}
body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,20px)}

/* ── Header ── */
.app-header{
  position:sticky;top:0;z-index:200;
  background:rgba(242,242,247,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);
  padding-top:env(safe-area-inset-top,0);
}
@media(prefers-color-scheme:dark){.app-header{background:rgba(0,0,0,0.8)}}
.header-inner{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:700;color:var(--text)}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── Stats / progress ── */
.prog-card{background:var(--bg);margin:8px 16px;border-radius:var(--r);padding:14px 16px}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.prog-label{font-size:13px;color:var(--text3)}
.prog-pct{font-size:28px;font-weight:700;color:var(--blue)}
.prog-bar-bg{height:7px;background:var(--gray5);border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s ease;min-width:0}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 16px 4px}
.stat-card{background:var(--bg);border-radius:var(--r);padding:10px 12px}
.stat-num{font-size:20px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:1px;line-height:1.3}

/* ── Bloque ── */
.bloque-header{padding:20px 16px 6px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3)}

/* ── Cuatrimestre ── */
.cuatri-wrap{margin:0 0 2px}
.cuatri-card{background:var(--bg);border-top:.5px solid var(--sep);border-bottom:.5px solid var(--sep)}
.cuatri-head{display:flex;align-items:center;padding:13px 14px 13px 16px;cursor:pointer;user-select:none;gap:10px;min-height:56px}
.cuatri-head:active{background:var(--gray6)}
.ct-accent{width:4px;height:34px;border-radius:2px;flex-shrink:0}
.ct-info{flex:1;min-width:0}
.ct-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.ct-opt{font-size:11px;font-weight:400;color:var(--text3)}
.ct-pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--gray5);color:var(--text3);white-space:nowrap;flex-shrink:0}
.ct-pill.done{background:rgba(52,199,89,.15);color:var(--green)}
@media(prefers-color-scheme:dark){.ct-pill.done{background:rgba(48,209,88,.2)}}
.ct-chev{color:var(--gray2);font-size:17px;flex-shrink:0;transition:transform .22s;font-weight:300}
.ct-chev.open{transform:rotate(90deg)}

/* ── Subject list ── */
.slist{display:none;border-top:.5px solid var(--sep)}
.slist.open{display:block}
.sitem{border-bottom:.5px solid var(--sep)}
.sitem:last-child{border-bottom:none}
.shead{display:flex;align-items:center;padding:11px 14px 11px 20px;cursor:pointer;user-select:none;gap:8px;min-height:48px}
.shead:active{background:var(--gray6)}
.s-clave{font-size:10px;font-family:'Menlo','SF Mono',monospace;color:var(--text3);width:54px;flex-shrink:0;line-height:1.2}
.s-name{flex:1;font-size:13.5px;color:var(--text);line-height:1.35}
.s-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--gray5);color:var(--text3);flex-shrink:0;min-width:34px;text-align:center;white-space:nowrap}
.s-badge.partial{color:var(--blue);background:rgba(0,122,255,.1)}
.s-badge.full{color:var(--green);background:rgba(52,199,89,.15)}
@media(prefers-color-scheme:dark){.s-badge.partial{background:rgba(10,132,255,.2)}.s-badge.full{background:rgba(48,209,88,.2)}}
.s-arr{color:var(--gray2);font-size:15px;flex-shrink:0;transition:transform .2s;font-weight:300}
.s-arr.open{transform:rotate(90deg)}
.sitem.electiva .s-name{color:var(--text3);font-style:italic}

/* ── Week grid ── */
.wgrid{display:none;padding:4px 16px 14px 20px;background:var(--gray6)}
.wgrid.open{display:block}
.wrow{display:flex;gap:5px;margin-bottom:5px}
.wrow:last-child{margin-bottom:0}
.wb{
  flex:1;height:44px;border-radius:10px;cursor:pointer;
  border:1.5px solid var(--sep);background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform .12s,background .15s;user-select:none;
}
.wb:active{transform:scale(.92)}
.wb.on{background:var(--green);border-color:transparent}
.wn{font-size:9px;color:var(--text3);font-weight:500;line-height:1}
.wc{font-size:16px;line-height:1;color:var(--sep)}
.wb.on .wn{color:rgba(255,255,255,.75)}
.wb.on .wc{color:#fff}

/* ── Footer ── */
.footer{padding:24px 16px 8px;text-align:center}
.reset-btn{background:none;border:none;color:var(--red);font-size:15px;font-family:var(--font);cursor:pointer;padding:10px 20px;border-radius:10px}
.reset-btn:active{background:rgba(255,59,48,.08)}
.footer-note{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
</style>
</head>

function buildWeekBoxes(clave,from,to,cid){
  let h='';const ws=gw(clave);
  for(let w=from;w<to;w++){
    const on=ws[w];
    h+=`<div class="wb${on?' on':''}" id="wb_${clave}_${w}" onclick="tw('${clave}',${w},'${cid}')">
      <span class="wn">S${w+1}</span><span class="wc">${on?'✓':'·'}</span>
    </div>`;
  }
  return h;
}

        item.className='sitem'+(s.e?' electiva':'');
        item.innerHTML=`
          <div class="shead" onclick="toggleS('${wid}','${aid}','${cid}')">
            <div class="s-clave">${s.c}</div>
            <div class="s-name">${s.n}</div>
            <div class="s-badge" id="${bid2}">0/${W}</div>
            <div class="s-arr" id="${aid}">›</div>
          </div>
          <div class="wgrid" id="${wid}">
            <div class="wrow">${buildWeekBoxes(s.c,0,7,cid)}</div>
            <div class="wrow">${buildWeekBoxes(s.c,7,14,cid)}</div>
          </div>
        `;
        sl.appendChild(item);
      });
    });
  });
  updAll();
}

function toggleC(id){
  const sl=document.getElementById('slist_'+id);
  const ch=document.getElementById('chev_'+id);
  const o=sl.classList.toggle('open');
  o?ch.classList.add('open'):ch.classList.remove('open');
}
function toggleS(wid,aid,cid){
  document.getElementById(wid).classList.toggle('open');
  document.getElementById(aid).classList.toggle('open');
}

function tw(clave,week,cid){
  const ws=gw(clave);ws[week]=!ws[week];state[clave]=ws;save();
  const box=document.getElementById('wb_'+clave+'_'+week);
  if(box){
    if(ws[week]){box.classList.add('on');box.querySelector('.wc').textContent='✓';}
    else{box.classList.remove('on');box.querySelector('.wc').textContent='·';}
  }
  updCuatri(cid);updGlobal();
}

function updBadge(cid,si,clave){
  const ws=gw(clave);const cnt=ws.filter(Boolean).length;
  const el=document.getElementById('b_'+cid+'_'+si);
  if(!el)return;
  el.textContent=cnt+'/'+W;
  el.className='s-badge'+(cnt===W?' full':cnt>0?' partial':'');
}

function updCuatri(cid){
  const pts=cid.replace('c','').split('_');
  const bi=+pts[0],ci=+pts[1];
  const c=D[bi].cs[ci];
  let tot=0,chk=0;
  c.as.forEach((s,si)=>{
    const ws=gw(s.c);const cnt=ws.filter(Boolean).length;
    tot+=W;chk+=cnt;updBadge(cid,si,s.c);
  });
  const pill=document.getElementById('pill_'+cid);
  if(pill){pill.textContent=chk+'/'+tot;pill.className='ct-pill'+(chk===tot&&tot>0?' done':'');}
}

function updAll(){D.forEach((_,bi)=>D[bi].cs.forEach((_,ci)=>updCuatri('c'+bi+'_'+ci)));updGlobal();}

function updGlobal(){
  let tot=0,chk=0,prog=0,full=0;
  D.forEach(b=>b.cs.forEach(c=>c.as.forEach(s=>{
    const ws=gw(s.c);const cnt=ws.filter(Boolean).length;
    tot+=W;chk+=cnt;if(cnt>0)prog++;if(cnt===W)full++;
  })));
  const pct=tot?Math.round(chk/tot*100):0;
  document.getElementById('g-pct').textContent=pct+'%';
  document.getElementById('g-bar').style.width=pct+'%';
  document.getElementById('st-weeks').textContent=chk;
  document.getElementById('st-prog').textContent=prog;
  document.getElementById('st-full').textContent=full;
}

function confirmReset(){
  if(confirm('¿Reiniciar todo el progreso?\nEsta acción no se puede deshacer.')){
    state={};save();
    document.getElementById('app-content').innerHTML='';
    build();
  }
}

build();
</script>
</body>
</html>
